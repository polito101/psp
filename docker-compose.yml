services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: psp
      POSTGRES_PASSWORD: psp_dev_password
      POSTGRES_DB: psp
    ports:
      - "5433:5432"
    volumes:
      - psp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psp -d psp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  psp_pg_data:
