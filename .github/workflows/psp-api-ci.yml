name: PSP API CI

on:
  push:
    branches: ['**']
    paths:
      - 'apps/psp-api/**'
      - '.github/workflows/psp-api-ci.yml'
  pull_request:
    paths:
      - 'apps/psp-api/**'
      - '.github/workflows/psp-api-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/psp-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/psp-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run -s lint

      - name: Unit tests
        run: npm test --silent

