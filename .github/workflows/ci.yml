name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/psp-api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: psp
          POSTGRES_PASSWORD: psp_test
          POSTGRES_DB: psp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psp -d psp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/psp-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Migrate (test DB)
        env:
          DATABASE_URL: postgresql://psp:psp_test@localhost:5432/psp_test?schema=public
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests
        env:
          DATABASE_URL: postgresql://psp:psp_test@localhost:5432/psp_test?schema=public
          REDIS_URL: redis://localhost:6379
          INTERNAL_API_SECRET: test-internal-secret
        run: npm run test

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"
      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive
      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate
