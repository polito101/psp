# Render Blueprint: psp-api (Docker) + web-finara + psp-backoffice (merchant) + psp-backoffice-admin (admin) + Postgres + Key-Value (Redis/Valkey).
# Aplicar: https://dashboard.render.com/blueprint/new
#
# Migraciones: el Dockerfile de psp-api ejecuta `prisma migrate deploy` en el entrypoint antes de `node dist/main`.
#
# URLs públicas: el nombre del servicio ("psp-api") NO garantiza el host https://psp-api.onrender.com — Render asigna
# un hostname único (p. ej. https://psp-api-yzfj.onrender.com). Copia la URL del servicio API desde el Dashboard
# (psp-api → Settings → URL) y mantén PSP_API_BASE_URL en web-finara y ambos backoffice IGUAL a esa URL.
# Si sincronizas este Blueprint desde el repo, estos valores SOBRESCRIBEN las variables del Dashboard.
#
# Ajusta también CORS/MERCHANT_ONBOARDING_BASE_URL/NEXT_PUBLIC_* si tus hosts de front difieren del ejemplo.

services:
  - type: keyvalue
    name: psp-kv
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Render Key Value requiere lista; compat Redis/Valkey para la API.

  - type: web
    name: psp-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./apps/psp-api/Dockerfile
    dockerContext: ./apps/psp-api
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/psp-api/**
    envVars:
      # sandbox: permite mock como proveedor sin PAYMENTS_ALLOW_MOCK (alineado con NODE_ENV sandbox en env.validation).
      - key: NODE_ENV
        value: sandbox
      - key: DATABASE_URL
        fromDatabase:
          name: psp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: psp-kv
          type: keyvalue
          property: connectionString
      - key: INTERNAL_API_SECRET
        generateValue: true
      - key: APP_ENCRYPTION_KEY
        generateValue: true
      - key: PAYMENTS_PROVIDER_ORDER
        value: mock
      - key: PAYMENTS_V2_ENABLED_MERCHANTS
        value: "*"
      - key: ENABLE_SWAGGER
        value: "false"
      # Orígenes del panel merchant, panel admin interno y sitio marketing.
      - key: CORS_ALLOWED_ORIGINS
        value: https://psp-backoffice.onrender.com,https://psp-backoffice-admin.onrender.com,https://web-finara.onrender.com
      # Origen público del backoffice donde existe `/onboarding/[token]` (emails de alta merchant).
      - key: MERCHANT_ONBOARDING_BASE_URL
        value: https://psp-backoffice.onrender.com
      # `req.ip` / throttler usan X-Forwarded-For cuando el proxy de confianza (p. ej. web-finara) reenvía la IP del visitante.
      - key: TRUST_PROXY
        value: "true"

  - type: web
    name: web-finara
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: apps/web-finara
    buildCommand: npm ci --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm run start
    buildFilter:
      paths:
        - apps/web-finara/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_MERCHANT_BACKOFFICE_URL
        value: https://psp-backoffice.onrender.com/login
      # Origen público real del servicio `psp-api` en Dashboard (único por cuenta/proyecto).
      - key: PSP_API_BASE_URL
        value: https://psp-api-yzfj.onrender.com
      - key: PSP_API_PROXY_TIMEOUT_MS
        value: "60000"

  - type: web
    name: psp-backoffice
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: apps/psp-backoffice
    # Tailwind/PostCSS y herramientas de build están en devDependencies; luego `npm prune --omit=dev` limpia el runtime.
    buildCommand: npm ci --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm run start
    buildFilter:
      paths:
        - apps/psp-backoffice/**
    envVars:
      - key: NODE_ENV
        value: production
      # Misma URL https que el servicio web `psp-api` (Dashboard → psp-api → URL).
      - key: PSP_API_BASE_URL
        value: https://psp-api-yzfj.onrender.com
      # Cold start Render free: PSP_API_PROXY_TIMEOUT_MS suficiente para el fetch BFF→API.
      - key: PSP_API_PROXY_TIMEOUT_MS
        value: "60000"
      - key: PSP_INTERNAL_API_SECRET
        fromService:
          name: psp-api
          type: web
          envVarKey: INTERNAL_API_SECRET
      # Portal público merchant: solo /login merchant (sin secreto admin en este deploy).
      - key: BACKOFFICE_PORTAL_MODE
        value: merchant
      - key: NEXT_PUBLIC_BACKOFFICE_PORTAL_MODE
        value: merchant
      - key: BACKOFFICE_SESSION_JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_TRANSACTIONS_REFRESH_MS
        value: "15000"

  - type: web
    name: psp-backoffice-admin
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: apps/psp-backoffice
    buildCommand: npm ci --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm run start
    buildFilter:
      paths:
        - apps/psp-backoffice/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: PSP_API_BASE_URL
        value: https://psp-api-yzfj.onrender.com
      - key: PSP_API_PROXY_TIMEOUT_MS
        value: "60000"
      - key: PSP_INTERNAL_API_SECRET
        fromService:
          name: psp-api
          type: web
          envVarKey: INTERNAL_API_SECRET
      # Portal admin: login en /admin/login (no enlazar públicamente desde marketing).
      - key: BACKOFFICE_PORTAL_MODE
        value: admin
      - key: NEXT_PUBLIC_BACKOFFICE_PORTAL_MODE
        value: admin
      - key: BACKOFFICE_ADMIN_SECRET
        generateValue: true
      - key: BACKOFFICE_SESSION_JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_TRANSACTIONS_REFRESH_MS
        value: "15000"

databases:
  - name: psp-postgres
    databaseName: psp
    user: psp
    plan: free
