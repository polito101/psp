# Render Blueprint: psp-api (Docker) + psp-backoffice (Node) + Postgres + Key-Value (Redis/Valkey).
# Aplicar: https://dashboard.render.com/blueprint/new
#
# Migraciones: el Dockerfile de psp-api ejecuta `prisma migrate deploy` en el entrypoint antes de `node dist/main`.
#
# Ajusta las URLs https://psp-api.onrender.com y https://psp-backoffice.onrender.com si Render
# te asigna otro dominio al crear el Blueprint (nombre de servicio ocupado globalmente).

services:
  - type: keyvalue
    name: psp-kv
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Render Key Value requiere lista; compat Redis/Valkey para la API.

  - type: web
    name: psp-api
    runtime: docker
    plan: free
    region: oregon
    branch: Phase1
    dockerfilePath: ./apps/psp-api/Dockerfile
    dockerContext: ./apps/psp-api
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/psp-api/**
    envVars:
      # sandbox: permite mock como proveedor sin PAYMENTS_ALLOW_MOCK (alineado con NODE_ENV sandbox en env.validation).
      - key: NODE_ENV
        value: sandbox
      - key: DATABASE_URL
        fromDatabase:
          name: psp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: psp-kv
          type: keyvalue
          property: connectionString
      - key: INTERNAL_API_SECRET
        generateValue: true
      - key: APP_ENCRYPTION_KEY
        generateValue: true
      - key: PAYMENTS_PROVIDER_ORDER
        value: mock
      - key: PAYMENTS_V2_ENABLED_MERCHANTS
        value: "*"
      - key: ENABLE_SWAGGER
        value: "false"
      # Origen del panel (ajústalo si tu dominio público del backoffice cambia).
      - key: CORS_ALLOWED_ORIGINS
        value: https://psp-backoffice.onrender.com

  - type: web
    name: psp-backoffice
    runtime: node
    plan: free
    region: oregon
    branch: Phase1
    rootDir: apps/psp-backoffice
    # NODE_ENV=production hace que npm ci omita devDependencies; Tailwind/PostCSS viven ahí y next build las necesita.
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: npm run start
    buildFilter:
      paths:
        - apps/psp-backoffice/**
    envVars:
      - key: NODE_ENV
        value: production
      # Debe coincidir con el hostname público del servicio psp-api tras el primer deploy.
      - key: PSP_API_BASE_URL
        value: https://psp-api.onrender.com
      # Cold start en plan free suele superar el default 5s del BFF (`backoffice-api.ts`).
      - key: PSP_API_PROXY_TIMEOUT_MS
        value: "60000"
      - key: PSP_INTERNAL_API_SECRET
        fromService:
          name: psp-api
          type: web
          envVarKey: INTERNAL_API_SECRET
      - key: BACKOFFICE_ADMIN_SECRET
        generateValue: true
      - key: BACKOFFICE_SESSION_JWT_SECRET
        generateValue: true
      - key: BACKOFFICE_MERCHANT_PORTAL_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_TRANSACTIONS_REFRESH_MS
        value: "15000"

databases:
  - name: psp-postgres
    databaseName: psp
    user: psp
    plan: free
